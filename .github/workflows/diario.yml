# ═══════════════════════════════════════════════════════════════════
# 🇨🇱 Monitor Ciudadano de Compras Públicas — Pipeline Diario
# ═══════════════════════════════════════════════════════════════════
# Ejecuta extracción + análisis + alertas Telegram todos los días
# y persiste la BD SQLite con auto-commit a la rama main.

name: "🇨🇱 Pipeline Diario — Monitor Compras"

on:
  # ── Ejecución automática diaria ──
  # 04:00 AM hora Chile (CLT = UTC-3) → 07:00 UTC
  schedule:
    - cron: "0 7 * * *"

  # ── Ejecución manual desde GitHub UI ──
  workflow_dispatch:

# ── Permisos para que el bot pueda hacer push ──
permissions:
  contents: write

jobs:
  monitor:
    name: "📥 Extraer → 🔍 Analizar → 📲 Notificar"
    runs-on: ubuntu-latest

    # ── Secretos inyectados como variables de entorno ──
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MERCADO_PUBLICO_TICKET: ${{ secrets.MERCADO_PUBLICO_TICKET }}

    steps:
      # ── 1. Clonar el repositorio (con historial para el push) ──
      - name: "📂 Checkout del repositorio"
        uses: actions/checkout@v4

      # ── 2. Instalar Python 3.10 ──
      - name: "🐍 Configurar Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"  # cachea dependencias para acelerar runs

      # ── 3. Instalar dependencias ──
      - name: "📦 Instalar dependencias"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Ejecutar el pipeline con alertas a Telegram ──
      - name: "🚀 Ejecutar monitor de compras"
        run: python main.py --telegram --verbose

      # ── 5. Persistir la BD con auto-commit ──
      # Solo hace commit si la BD cambió (datos nuevos descargados)
      - name: "💾 Commit y push de la base de datos"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add auditoria_estado.db
          # --allow-empty no se usa: si no hay cambios, el commit falla silenciosamente
          git diff --cached --quiet || git commit -m "📊 Actualización diaria de datos — $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
