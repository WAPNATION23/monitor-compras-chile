# ═══════════════════════════════════════════════════════════════════
# 🇨🇱 Monitor Ciudadano de Compras Públicas — Pipeline Diario
# ═══════════════════════════════════════════════════════════════════
# Ejecuta extracción + análisis + alertas Telegram todos los días
# y persiste la BD SQLite con auto-commit a la rama main.

name: "🇨🇱 Pipeline Diario — Monitor Compras"

on:
  # ── Ejecución automática diaria ──
  # 04:00 AM hora Chile (CLT = UTC-3) → 07:00 UTC
  schedule:
    - cron: "0 7 * * *"

  # ── Ejecución manual desde GitHub UI ──
  workflow_dispatch:

# ── Permisos mínimos (solo lectura, no se pushea DB a main) ──
permissions:
  contents: read

jobs:
  monitor:
    name: "📥 Extraer → 🔍 Analizar → 📲 Notificar"
    runs-on: ubuntu-latest

    # ── Secretos inyectados como variables de entorno ──
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MERCADO_PUBLICO_TICKET: ${{ secrets.MERCADO_PUBLICO_TICKET }}

    steps:
      # ── 1. Clonar el repositorio (con historial para el push) ──
      - name: "📂 Checkout del repositorio"
        uses: actions/checkout@v4

      # ── 2. Instalar Python 3.10 ──
      - name: "🐍 Configurar Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"  # cachea dependencias para acelerar runs

      # ── 3. Instalar dependencias ──
      - name: "📦 Instalar dependencias"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Ejecutar el pipeline con alertas a Telegram ──
      - name: "🚀 Ejecutar monitor de compras"
        run: python main.py --telegram --verbose

      # ── 5. Publicar la BD como artefacto (retención 7 días) ──
      # No se versiona en git: auditoria_estado.db está en .gitignore.
      # Para consumirla en otros workflows, descargarla vía actions/download-artifact.
      - name: "📦 Subir base de datos como artefacto"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auditoria-estado-db
          path: auditoria_estado.db
          if-no-files-found: warn
          retention-days: 7
